<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photos | GATO Marathon</title>
  <link href="https://fonts.googleapis.com/css?family=Glass+Antiqua&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Lato:400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
  <style>
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--background);
      border-bottom: 1px solid #3a2911;
    }

    .photos-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 12px 48px;
    }

    .photos-section p.subtitle {
      text-align: center;
      color: var(--text);
      font-size: 0.95em;
      margin: -0.5em 0 1.8em;
      opacity: 0.75;
    }

    /* ── Masonry grid ── */
    .gallery {
      column-count: 4;
      column-gap: 8px;
    }

    @media (max-width: 1024px) { .gallery { column-count: 3; } }
    @media (max-width: 640px)  { .gallery { column-count: 2; column-gap: 6px; } }
    @media (max-width: 480px)  { .gallery { column-count: 1; } }

    @media (max-width: 640px) {
      .photos-section {
        padding: 0 8px 32px;
      }
      .photos-section h1 {
        font-size: 1.6em;
      }
      .photos-section p.subtitle {
        font-size: 0.8em;
      }
      nav li {
        margin: 0 0.6em;
      }
      nav a {
        font-size: 1em;
        padding: 0.7em 0.3em;
      }
      .lb-btn {
        font-size: 1.3rem;
        padding: 0.7rem 0.8rem;
      }
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 8px;
      cursor: pointer;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid rgba(235, 228, 187, 0.15);
      position: relative;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
      filter: brightness(1.1);
    }

    .gallery-item .hover-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      transition: background 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-item:hover .hover-overlay {
      background: rgba(35, 20, 4, 0.4);
    }

    .gallery-item .hover-overlay span {
      color: var(--accent);
      font-size: 1.8rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .gallery-item:hover .hover-overlay span { opacity: 1; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 8, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      border-radius: 4px;
      border: 1px solid rgba(235, 228, 187, 0.2);
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7);
      object-fit: contain;
      user-select: none;
    }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(235, 228, 187, 0.08);
      border: 1px solid rgba(235, 228, 187, 0.2);
      color: var(--accent);
      font-size: 1.8rem;
      padding: 0.9rem 1.1rem;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, border-color 0.2s;
      z-index: 10;
      line-height: 1;
    }

    .lb-btn:hover {
      background: rgba(235, 228, 187, 0.18);
      border-color: var(--accent);
    }

    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }

    #lb-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(235, 228, 187, 0.08);
      border: 1px solid rgba(235, 228, 187, 0.2);
      color: var(--accent);
      font-size: 1.2rem;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s, border-color 0.2s;
      line-height: 1;
    }

    #lb-close:hover {
      background: rgba(235, 228, 187, 0.18);
      border-color: var(--accent);
    }

    #lb-counter {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text);
      font-size: 0.9em;
      letter-spacing: 0.06em;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="djs.html">DJs</a></li>
        <li><a href="schedule.html">Schedule</a></li>
        <li><a href="logistics.html">Logistics</a></li>
        <li><a href="faqs.html">FAQs</a></li>
        <li><a href="photos.html" class="active">Photos</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="photos-section">
      <h1>Gato 2025</h1>
      <p class="subtitle">Click any photo to view full size &nbsp;·&nbsp; ← → to navigate &nbsp;·&nbsp; Esc to close</p>

      <div class="gallery" id="gallery">
        <p id="gallery-status" style="text-align:center; opacity:0.6; padding:2em;">Loading photos…</p>
      </div>
    </section>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lb-close" title="Close (Esc)">&#x2715;</button>
    <button class="lb-btn" id="lb-prev" title="Previous (←)">&#x276E;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-btn" id="lb-next" title="Next (→)">&#x276F;</button>
    <div id="lb-counter"></div>
  </div>

  <footer class="site-footer">
    © 2026 GATO Marathon. All rights reserved.
  </footer>

  <script>
    const IMAGE_DIR    = 'images/gato2025/';
    const MANIFEST_URL = IMAGE_DIR + 'manifest.json';

    const gallery = document.getElementById('gallery');
    const status  = document.getElementById('gallery-status');
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lb-img');
    const lbCount = document.getElementById('lb-counter');
    let items   = [];
    let current = 0;

    function open(index) {
      current = index;
      lbImg.src = items[current].src;
      lbImg.alt = items[current].alt;
      lbCount.textContent = `${current + 1} / ${items.length}`;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function close() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + items.length) % items.length;
      lbImg.src = items[current].src;
      lbImg.alt = items[current].alt;
      lbCount.textContent = `${current + 1} / ${items.length}`;
    }

    function buildGallery(filenames) {
      gallery.innerHTML = '';
      filenames.forEach((name, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `<img src="${IMAGE_DIR}${encodeURIComponent(name)}" alt="GATO 2025 photo ${i + 1}" loading="lazy"><div class="hover-overlay"><span>&#x26F6;</span></div>`;
        item.addEventListener('click', () => open(i));
        gallery.appendChild(item);
      });
      items = Array.from(gallery.querySelectorAll('.gallery-item img'));
      if (items.length === 0) {
        gallery.innerHTML = '<p style="text-align:center; opacity:0.6; padding:2em;">No photos yet — check back soon!</p>';
      }
    }

    fetch(MANIFEST_URL, { cache: 'no-cache' })
      .then(r => {
        if (!r.ok) throw new Error('Manifest ' + r.status);
        return r.json();
      })
      .then(names => buildGallery(names))
      .catch(err => {
        status.textContent = 'Could not load photos. Please try again later.';
        console.error('Failed to load manifest:', err);
      });

    document.getElementById('lb-prev').addEventListener('click',  e => { e.stopPropagation(); navigate(-1); });
    document.getElementById('lb-next').addEventListener('click',  e => { e.stopPropagation(); navigate(+1); });
    document.getElementById('lb-close').addEventListener('click', close);

    lb.addEventListener('click', e => { if (e.target === lb) close(); });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  navigate(-1);
      if (e.key === 'ArrowRight') navigate(+1);
      if (e.key === 'Escape')     close();
    });

    // Swipe support for mobile
    let touchStartX = 0;
    lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    lb.addEventListener('touchend',   e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
    });
  </script>
</body>
</html>
